# ============================================================================
# Elastic Managed OTLP credentials.  ►► EDIT BOTH VALUES BEFORE APPLYING ◄◄
#
# In Elastic Cloud:  (Serverless) project → "Add data" → OpenTelemetry → the
# "Managed OTLP endpoint" card shows the endpoint + an API key.
#
#   ELASTIC_OTLP_ENDPOINT : the gRPC host:port, NO scheme, e.g.
#                           abc123.ingest.us-east-1.aws.elastic.cloud:443
#                           (if Elastic shows https://…  drop the https:// here)
#   ELASTIC_OTLP_API_KEY  : the base64 API key string Elastic gives you
#                           (used verbatim after "ApiKey " in the auth header)
#
# Consumed by BOTH the gateway and the LB deployments via envFrom.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: elastic-otlp
  namespace: otel-poc
type: Opaque
stringData:
  ELASTIC_OTLP_ENDPOINT: "REPLACE_ME.ingest.REGION.CSP.elastic.cloud:443"
  ELASTIC_OTLP_API_KEY: "REPLACE_ME_BASE64_API_KEY"
