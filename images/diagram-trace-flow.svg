<svg width="1600" height="640" viewBox="0 0 1600 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#141C2E"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBBF3D"/><stop offset="1" stop-color="#F5A800"/></linearGradient>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5B8DEF"/></marker>
    <marker id="arA" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#F5A800"/></marker>
    <marker id="arG" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5FD6A6"/></marker>
    <marker id="arM" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5A6E8C"/></marker>
  </defs>
  <rect width="1600" height="640" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="600" rx="24" fill="none" stroke="#23304C" stroke-width="2"/>

  <text x="800" y="58" text-anchor="middle" font-size="34" font-weight="800" fill="#F4F7FB">Trace Flow — Same <tspan fill="#FBBF3D">trace_id</tspan> → Same Gateway</text>
  <text x="800" y="90" text-anchor="middle" font-size="18" fill="#8DA2C0">how one trace's spans converge on a single tail-sampling gateway</text>

  <!-- 1. apps -->
  <rect x="50" y="250" width="190" height="120" rx="12" fill="#101A2E" stroke="#5B8DEF" stroke-width="1.8"/>
  <text x="145" y="298" text-anchor="middle" font-size="17" font-weight="700" fill="#F4F7FB">Apps + SDKs</text>
  <text x="145" y="322" text-anchor="middle" font-size="12.5" fill="#8DA2C0">OTLP · batched</text>
  <text x="145" y="342" text-anchor="middle" font-size="12.5" fill="#8DA2C0">many traces / request</text>

  <!-- 2. agent -->
  <rect x="300" y="250" width="190" height="120" rx="12" fill="#101A2E" stroke="#5B8DEF" stroke-width="1.8"/>
  <text x="395" y="298" text-anchor="middle" font-size="17" font-weight="700" fill="#F4F7FB">Agent</text>
  <text x="395" y="322" text-anchor="middle" font-size="12.5" fill="#8FB4F5">DaemonSet / Deployment</text>
  <text x="395" y="342" text-anchor="middle" font-size="12.5" fill="#8DA2C0">enrich · batch</text>

  <!-- 3. otel-lb hero -->
  <rect x="560" y="228" width="280" height="170" rx="14" fill="#13203B" stroke="url(#amber)" stroke-width="2.6"/>
  <rect x="560" y="228" width="280" height="6" rx="3" fill="url(#amber)"/>
  <text x="700" y="266" text-anchor="middle" font-size="18" font-weight="800" fill="#FBBF3D">otel-lb</text>
  <text x="700" y="292" text-anchor="middle" font-size="14" fill="#C9D6E8">loadbalancing exporter</text>
  <text x="700" y="318" text-anchor="middle" font-size="13.5" fill="#C9D6E8">split batch by trace_id</text>
  <text x="700" y="342" text-anchor="middle" font-size="13.5" fill="#C9D6E8"><tspan fill="#FBBF3D">hash(trace_id)</tspan> → owner</text>
  <text x="700" y="368" text-anchor="middle" font-size="12.5" fill="#6F87A8">consistent-hash ring</text>

  <!-- 4. gateways -->
  <rect x="1030" y="158" width="270" height="74" rx="11" fill="#101A2E" stroke="#5B8DEF" stroke-width="1.6"/>
  <text x="1165" y="190" text-anchor="middle" font-size="16" font-weight="700" fill="#F4F7FB">otel-gateway-0</text>
  <text x="1165" y="212" text-anchor="middle" font-size="12.5" fill="#8DA2C0">tail_sampling</text>

  <rect x="1030" y="248" width="270" height="92" rx="11" fill="#13203B" stroke="url(#amber)" stroke-width="2.6"/>
  <text x="1165" y="282" text-anchor="middle" font-size="16" font-weight="800" fill="#FBBF3D">otel-gateway-1</text>
  <text x="1165" y="304" text-anchor="middle" font-size="12.5" fill="#5FD6A6">owns trace T → sees ALL its spans</text>
  <text x="1165" y="324" text-anchor="middle" font-size="12.5" fill="#C9D6E8">tail_sampling decides</text>

  <rect x="1030" y="356" width="270" height="74" rx="11" fill="#101A2E" stroke="#5B8DEF" stroke-width="1.6"/>
  <text x="1165" y="388" text-anchor="middle" font-size="16" font-weight="700" fill="#F4F7FB">otel-gateway-2</text>
  <text x="1165" y="410" text-anchor="middle" font-size="12.5" fill="#8DA2C0">tail_sampling</text>

  <!-- 5. elastic -->
  <rect x="1360" y="250" width="190" height="120" rx="14" fill="#241B07" stroke="url(#amber)" stroke-width="2.4"/>
  <text x="1455" y="298" text-anchor="middle" font-size="20" font-weight="800" fill="#FBBF3D">Elastic</text>
  <text x="1455" y="324" text-anchor="middle" font-size="13.5" fill="#C9D6E8">Managed OTLP</text>
  <text x="1455" y="346" text-anchor="middle" font-size="12" fill="#8DA2C0">APM · search</text>

  <!-- arrows -->
  <line x1="242" y1="310" x2="296" y2="310" stroke="#5B8DEF" stroke-width="2.4" marker-end="url(#ar)"/>
  <line x1="492" y1="310" x2="556" y2="310" stroke="#5B8DEF" stroke-width="2.4" marker-end="url(#ar)"/>
  <text x="524" y="296" text-anchor="middle" font-size="11.5" fill="#8FB4F5">gRPC</text>
  <text x="524" y="338" text-anchor="middle" font-size="10.5" fill="#6F87A8">L4: 1 conn→1 pod</text>

  <!-- fan-out from lb to gateways -->
  <path d="M842,300 C930,260 950,210 1026,196" fill="none" stroke="#5B8DEF" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M842,312 C930,310 950,300 1026,295" fill="none" stroke="#F5A800" stroke-width="3" marker-end="url(#arA)"/>
  <path d="M842,326 C930,370 950,400 1026,394" fill="none" stroke="#5B8DEF" stroke-width="2" marker-end="url(#ar)"/>
  <text x="930" y="250" text-anchor="middle" font-size="12.5" fill="#C7A65E">all spans of trace T</text>

  <!-- gateways -> elastic -->
  <path d="M1302,294 C1330,294 1334,300 1356,304" fill="none" stroke="#5FD6A6" stroke-width="2.6" marker-end="url(#arG)"/>
  <text x="1330" y="284" text-anchor="middle" font-size="11.5" fill="#5FD6A6">sampled</text>

  <!-- lb -> elastic metrics/logs (below) -->
  <path d="M700,398 C700,520 1300,520 1455,374" fill="none" stroke="#5A6E8C" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arM)"/>
  <text x="1010" y="540" text-anchor="middle" font-size="12.5" fill="#8DA2C0">metrics · logs (no trace_id) → straight to Elastic</text>

  <!-- insight band -->
  <rect x="50" y="452" width="900" height="58" rx="10" fill="#0F1B30" stroke="#F5A800" stroke-width="1.6"/>
  <rect x="50" y="452" width="7" height="58" rx="3" fill="url(#amber)"/>
  <text x="74" y="478" font-size="14.5" font-weight="800" fill="#FBBF3D">Any LB replica computes the same hash over the same gateway list.</text>
  <text x="74" y="500" font-size="13.5" fill="#C9D6E8">So trace T lands on gateway-1 no matter which LB pod handled its spans — convergent, no coordination.</text>
</svg>
