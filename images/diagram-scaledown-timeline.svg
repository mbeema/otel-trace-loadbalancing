<svg width="1600" height="520" viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#141C2E"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#FBBF3D"/><stop offset="1" stop-color="#F5A800"/></linearGradient>
    <marker id="arA" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#F5A800"/></marker>
  </defs>
  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="480" rx="24" fill="none" stroke="#23304C" stroke-width="2"/>

  <text x="800" y="56" text-anchor="middle" font-size="33" font-weight="800" fill="#F4F7FB">Graceful Scale-Down — what survives, what's lost</text>
  <text x="800" y="88" text-anchor="middle" font-size="18" fill="#8DA2C0">a gateway pod terminating: the drain sequence and which buffers make it out</text>

  <!-- phase boxes -->
  <rect x="70" y="130" width="340" height="118" rx="12" fill="#101A2E" stroke="#33508F" stroke-width="1.6"/>
  <text x="92" y="160" font-size="16" font-weight="800" fill="#8FB4F5">1 · Terminating</text>
  <text x="92" y="186" font-size="13.5" fill="#C9D6E8">removed from Service Endpoints</text>
  <text x="92" y="210" font-size="13.5" fill="#C9D6E8">LB stops routing new traces here</text>
  <text x="92" y="234" font-size="12" fill="#6F87A8">(k8s endpoint controller)</text>

  <rect x="430" y="130" width="340" height="118" rx="12" fill="#13203B" stroke="url(#amber)" stroke-width="1.8"/>
  <text x="452" y="160" font-size="16" font-weight="800" fill="#FBBF3D">2 · preStop sleep</text>
  <text x="452" y="186" font-size="13.5" fill="#C9D6E8">busybox sleep (gw 20s / lb 15s)</text>
  <text x="452" y="210" font-size="13.5" fill="#C9D6E8">endpoint removal propagates;</text>
  <text x="452" y="232" font-size="13.5" fill="#C9D6E8">in-flight requests settle</text>

  <rect x="790" y="130" width="360" height="118" rx="12" fill="#101A2E" stroke="#33508F" stroke-width="1.6"/>
  <text x="812" y="160" font-size="16" font-weight="800" fill="#8FB4F5">3 · SIGTERM → drain</text>
  <text x="812" y="186" font-size="13.5" fill="#C9D6E8">stop receivers → flush batch</text>
  <text x="812" y="210" font-size="13.5" fill="#C9D6E8">→ drain <tspan fill="#5FD6A6" font-weight="700">sending_queue</tspan></text>
  <text x="812" y="234" font-size="12" fill="#6F87A8">downstream export of buffered data</text>

  <rect x="1170" y="130" width="360" height="118" rx="12" fill="#101A2E" stroke="#33508F" stroke-width="1.6"/>
  <text x="1192" y="160" font-size="16" font-weight="800" fill="#8FB4F5">4 · exit</text>
  <text x="1192" y="186" font-size="13.5" fill="#C9D6E8">within terminationGracePeriod</text>
  <text x="1192" y="210" font-size="13.5" fill="#C9D6E8">Seconds (gw 90s)</text>
  <text x="1192" y="234" font-size="12" fill="#E0707F">else SIGKILL → lose remainder</text>

  <!-- timeline -->
  <line x1="100" y1="290" x2="1500" y2="290" stroke="#2A3A5A" stroke-width="2"/>
  <circle cx="240" cy="290" r="8" fill="#5B8DEF"/><circle cx="600" cy="290" r="8" fill="#F5A800"/><circle cx="970" cy="290" r="8" fill="#5B8DEF"/><circle cx="1350" cy="290" r="8" fill="#5B8DEF"/>
  <line x1="252" y1="290" x2="588" y2="290" stroke="#F5A800" stroke-width="2.4" marker-end="url(#arA)"/>
  <line x1="612" y1="290" x2="958" y2="290" stroke="#F5A800" stroke-width="2.4" marker-end="url(#arA)"/>
  <line x1="982" y1="290" x2="1338" y2="290" stroke="#F5A800" stroke-width="2.4" marker-end="url(#arA)"/>

  <!-- outcomes -->
  <rect x="120" y="330" width="640" height="74" rx="12" fill="#0F1B30" stroke="#36C28B" stroke-width="1.8"/>
  <text x="142" y="362" font-size="16" font-weight="800" fill="#5FD6A6">✓ Exporter sending_queue → DRAINED (survives)</text>
  <text x="142" y="388" font-size="13.5" fill="#C9D6E8">buffered batches get exported before exit, given enough grace</text>

  <rect x="800" y="330" width="700" height="74" rx="12" fill="#0F1B30" stroke="#5A3340" stroke-width="1.8"/>
  <text x="822" y="362" font-size="16" font-weight="800" fill="#E0707F">✗ Tail-sampling buffer → DROPPED (lost)</text>
  <text x="822" y="388" font-size="13.5" fill="#C9D6E8">spans of undecided traces aren't drained — that's why you scale gateways down one at a time</text>

  <!-- rule of thumb -->
  <rect x="120" y="430" width="1380" height="50" rx="10" fill="#13203B" stroke="#F5A800" stroke-width="1.4"/>
  <text x="142" y="461" font-size="14.5" fill="#C9D6E8"><tspan font-weight="800" fill="#FBBF3D">Rule:</tspan> set <tspan font-weight="700" fill="#F4F7FB">terminationGracePeriodSeconds &gt; preStop + decision_wait</tspan>. Upstream at-least-once retry recovers unacked data; a persistent queue protects restarts, not scale-down.</text>
</svg>
